<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot password — Orbit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- ═══════════════════════════════════════════════════════════
       TRACKING POINTS ON THIS PAGE
       • page_view                  — on load
       • reset_method_change        — user switches email ↔ phone
       • reset_email_focus          — email field first focused
       • reset_email_entered        — valid email on blur
       • reset_phone_focus          — phone field first focused
       • reset_submit_attempt       — Send code button clicked
       • reset_submit_error         — validation failed (with reason)
       • reset_submit_success       — proceeding to verification
       • reset_back_to_signin       — back link clicked
  ═══════════════════════════════════════════════════════════ -->

  <div class="auth-card" data-track-section="forgot_password_form">

    <!-- Logo -->
    <a href="index.html" class="logo">
      <svg width="26" height="26" viewBox="0 0 28 28" fill="none" aria-hidden="true">
        <rect width="28" height="28" rx="7" fill="#18181B"/>
        <circle cx="14" cy="14" r="5.5" stroke="white" stroke-width="2"/>
        <circle cx="14" cy="14" r="1.75" fill="white"/>
      </svg>
      <span class="logo-name">Orbit</span>
    </a>

    <!-- Lock icon -->
    <div style="text-align:center; margin-bottom:16px;">
      <div style="display:inline-flex;align-items:center;justify-content:center;width:48px;height:48px;background:var(--bg);border:1px solid var(--border);border-radius:12px;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--text-sec)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
      </div>
    </div>

    <h1 class="auth-title">Forgot your password?</h1>
    <p class="auth-subtitle">Choose how you'd like to receive your verification code.</p>

    <!-- Method toggle -->
    <div class="method-toggle" id="method-toggle">
      <button type="button" class="method-btn active" id="method-email" data-method="email">
        Email
      </button>
      <button type="button" class="method-btn" id="method-phone" data-method="sms">
        Text message
      </button>
    </div>

    <!-- Alert -->
    <div id="alert" class="alert alert-error" style="display:none;" role="alert"></div>

    <form id="reset-form" novalidate>

      <!-- Email input -->
      <div class="form-group" id="email-group">
        <label for="email">Email address</label>
        <input
          type="email"
          id="email"
          name="email"
          autocomplete="email"
          placeholder="jane@company.com"
          data-track-field="email"
        >
        <span class="field-error" id="err-email"></span>
      </div>

      <!-- Phone input (shown for SMS) -->
      <div class="form-group" id="phone-group" style="display:none;">
        <label for="phone">Mobile number</label>
        <input
          type="tel"
          id="phone"
          name="phone"
          autocomplete="tel"
          placeholder="+1 555 000 0000"
          data-track-field="phone"
        >
        <span class="field-error" id="err-phone"></span>
        <p style="font-size:12px;color:var(--muted);margin-top:5px;line-height:1.4;">
          Must match the number on your account.
        </p>
      </div>

      <!-- TRACKING: reset_submit_attempt -->
      <button
        type="submit"
        id="btn-submit"
        class="btn btn-primary"
        style="margin-top:4px;"
        data-track="reset_submit_attempt"
      >
        Send verification code
      </button>

    </form>

    <p class="auth-footer" style="margin-top:18px;">
      <a href="signin.html" id="btn-back" data-track="reset_back_to_signin">← Back to sign in</a>
    </p>

  </div>

  <script src="app.js"></script>
  <script>
    // ── Page tracking ──────────────────────────────────────────
    Track.page('Forgot Password', { path: 'forgot-password.html' });

    // ── Method toggle ──────────────────────────────────────────
    let currentMethod = 'email';

    document.querySelectorAll('.method-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const newMethod = btn.dataset.method;
        if (newMethod === currentMethod) return;

        document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentMethod = newMethod;

        const isEmail = newMethod === 'email';
        document.getElementById('email-group').style.display = isEmail ? '' : 'none';
        document.getElementById('phone-group').style.display = isEmail ? 'none' : '';
        document.getElementById('alert').style.display = 'none';

        Track.event('reset_method_change', { method: newMethod });
      });
    });

    // ── Field tracking ─────────────────────────────────────────
    let emailFocused = false;
    document.getElementById('email').addEventListener('focus', () => {
      if (!emailFocused) { emailFocused = true; Track.event('reset_email_focus'); }
    });

    document.getElementById('email').addEventListener('blur', e => {
      if (isEmail(e.target.value)) {
        Track.event('reset_email_entered', { domain: e.target.value.split('@')[1] });
      }
    });

    let phoneFocused = false;
    document.getElementById('phone').addEventListener('focus', () => {
      if (!phoneFocused) { phoneFocused = true; Track.event('reset_phone_focus'); }
    });

    // ── Form submit ────────────────────────────────────────────
    document.getElementById('reset-form').addEventListener('submit', e => {
      e.preventDefault();

      const emailVal = document.getElementById('email').value.trim();
      const phoneVal = document.getElementById('phone').value.trim();
      const isEmailMethod = currentMethod === 'email';

      clearFieldErrors(e.target);
      document.getElementById('alert').style.display = 'none';

      let valid = true;

      if (isEmailMethod && !isEmail(emailVal)) {
        showFieldError(
          document.getElementById('email'),
          document.getElementById('err-email'),
          'Please enter a valid email address.'
        );
        valid = false;
      }

      if (!isEmailMethod && !phoneVal) {
        showFieldError(
          document.getElementById('phone'),
          document.getElementById('err-phone'),
          'Please enter your mobile number.'
        );
        valid = false;
      }

      if (!valid) {
        Track.event('reset_submit_error', { reason: 'validation_failed', method: currentMethod });
        return;
      }

      Track.event('reset_submit_attempt', { method: currentMethod });
      const btn = document.getElementById('btn-submit');
      btnLoading(btn, true);

      const target = isEmailMethod ? maskEmail(emailVal) : maskPhone(phoneVal);

      setTimeout(() => {
        Track.event('reset_submit_success', { method: currentMethod });
        Proto.go('verify.html', {
          context: 'reset',
          method: currentMethod,
          target,
        });
      }, 800);
    });

    // ── Back link ──────────────────────────────────────────────
    document.getElementById('btn-back').addEventListener('click', () => {
      Track.event('reset_back_to_signin');
    });
  </script>
