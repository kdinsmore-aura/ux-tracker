<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset password — Orbit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>


  <!-- ═══════════════════════════════════════════════════════════
       TRACKING POINTS ON THIS PAGE
       • page_view                   — on load
       • reset_pw_field_focus        — new password field focused
       • reset_pw_strength_change    — password strength level change
       • reset_pw_confirm_focus      — confirm password field focused
       • reset_pw_submit_attempt     — Save button clicked
       • reset_pw_submit_error       — validation failed (with reason)
       • reset_pw_submit_success     — password changed, redirecting to sign in
  ═══════════════════════════════════════════════════════════ -->

  <div class="auth-card" data-track-section="reset_password_form">

    <!-- Logo -->
    <a href="index.html" class="logo">
      <svg width="26" height="26" viewBox="0 0 28 28" fill="none" aria-hidden="true">
        <rect width="28" height="28" rx="7" fill="#18181B"/>
        <circle cx="14" cy="14" r="5.5" stroke="white" stroke-width="2"/>
        <circle cx="14" cy="14" r="1.75" fill="white"/>
      </svg>
      <span class="logo-name">Orbit</span>
    </a>

    <!-- Identity verified badge -->
    <div
      class="alert alert-success"
      style="display:flex;align-items:center;gap:8px;margin-bottom:20px;"
    >
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#16A34A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M20 6L9 17l-5-5"/>
      </svg>
      Identity verified. Set a new password below.
    </div>

    <h1 class="auth-title">Set new password</h1>
    <p class="auth-subtitle">Choose a strong password you haven't used before.</p>

    <!-- Alert -->
    <div id="alert" class="alert alert-error" style="display:none;" role="alert"></div>

    <form id="reset-form" novalidate>

      <div class="form-group">
        <label for="password">New password</label>
        <div class="input-wrapper">
          <input
            type="password"
            id="password"
            name="password"
            autocomplete="new-password"
            placeholder="Min. 8 characters"
            data-track-field="password"
          >
          <button type="button" class="toggle-password" id="toggle-pw" aria-label="Show password" tabindex="-1">
            <svg id="icon-eye" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg id="icon-eye-off" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
              <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
        <!-- Strength indicator -->
        <div class="strength-bar" style="margin-top:7px;">
          <div class="strength-seg" id="seg-1"></div>
          <div class="strength-seg" id="seg-2"></div>
          <div class="strength-seg" id="seg-3"></div>
          <div class="strength-seg" id="seg-4"></div>
        </div>
        <div class="strength-label" id="strength-label"></div>
        <span class="field-error" id="err-password"></span>
      </div>

      <div class="form-group" style="margin-top:4px;">
        <label for="confirm-password">Confirm new password</label>
        <div class="input-wrapper">
          <input
            type="password"
            id="confirm-password"
            name="confirmPassword"
            autocomplete="new-password"
            placeholder="Re-enter your password"
            data-track-field="confirm_password"
          >
          <button type="button" class="toggle-password" id="toggle-pw2" aria-label="Show confirm password" tabindex="-1">
            <svg id="icon-eye2" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg id="icon-eye-off2" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
              <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
        <span class="field-error" id="err-confirm"></span>
      </div>

      <!-- Requirements checklist -->
      <ul id="pw-requirements" style="list-style:none;margin:10px 0 16px;padding:0;">
        <li id="req-length"  style="font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;margin-bottom:4px;">
          <span class="req-icon">○</span> At least 8 characters
        </li>
        <li id="req-case" style="font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;margin-bottom:4px;">
          <span class="req-icon">○</span> Upper &amp; lowercase letters
        </li>
        <li id="req-number" style="font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;">
          <span class="req-icon">○</span> At least one number
        </li>
      </ul>

      <!-- TRACKING: reset_pw_submit_attempt -->
      <button
        type="submit"
        id="btn-submit"
        class="btn btn-primary"
        data-track="reset_pw_submit_attempt"
      >
        Save new password
      </button>

    </form>

  </div>

  <script src="app.js"></script>
  <script>
    // ── Page tracking ──────────────────────────────────────────
    Track.page('Reset Password', { path: 'reset-password.html' });

    // ── Show/hide password toggles ─────────────────────────────
    function setupToggle(btnId, inputId, eyeId, eyeOffId) {
      document.getElementById(btnId).addEventListener('click', () => {
        const input = document.getElementById(inputId);
        const isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        document.getElementById(eyeId).style.display    = isHidden ? 'none' : '';
        document.getElementById(eyeOffId).style.display = isHidden ? ''     : 'none';
      });
    }

    setupToggle('toggle-pw',  'password',         'icon-eye',  'icon-eye-off');
    setupToggle('toggle-pw2', 'confirm-password', 'icon-eye2', 'icon-eye-off2');

    // ── Requirements checker ───────────────────────────────────
    function updateRequirements(pw) {
      const checks = {
        'req-length':  pw.length >= 8,
        'req-case':    /[A-Z]/.test(pw) && /[a-z]/.test(pw),
        'req-number':  /\d/.test(pw),
      };

      Object.entries(checks).forEach(([id, passed]) => {
        const li   = document.getElementById(id);
        const icon = li.querySelector('.req-icon');
        if (passed) {
          icon.textContent = '✓';
          li.style.color = '#16A34A';
        } else {
          icon.textContent = '○';
          li.style.color = '';
        }
      });
    }

    // ── Password strength + requirements ──────────────────────
    let lastStrengthLevel = 0;
    let pwFocused = false;

    document.getElementById('password').addEventListener('focus', () => {
      if (!pwFocused) { pwFocused = true; Track.event('reset_pw_field_focus'); }
    });

    document.getElementById('password').addEventListener('input', e => {
      const pw = e.target.value;
      const level = passwordStrength(pw);
      const segs  = document.querySelectorAll('.strength-seg');
      const label = document.getElementById('strength-label');

      segs.forEach((seg, i) => {
        seg.style.background = i < level ? strengthColors[level] : '';
      });
      label.textContent = pw.length ? strengthLabels[level] : '';
      label.style.color = strengthColors[level] || '';

      updateRequirements(pw);

      if (level !== lastStrengthLevel) {
        lastStrengthLevel = level;
        Track.event('reset_pw_strength_change', { level, label: strengthLabels[level] });
      }
    });

    let confirmFocused = false;
    document.getElementById('confirm-password').addEventListener('focus', () => {
      if (!confirmFocused) { confirmFocused = true; Track.event('reset_pw_confirm_focus'); }
    });

    // ── Form submit ────────────────────────────────────────────
    document.getElementById('reset-form').addEventListener('submit', e => {
      e.preventDefault();

      const pwVal      = document.getElementById('password').value;
      const confirmVal = document.getElementById('confirm-password').value;

      clearFieldErrors(e.target);
      document.getElementById('alert').style.display = 'none';

      let valid = true;

      if (pwVal.length < 8) {
        showFieldError(
          document.getElementById('password'),
          document.getElementById('err-password'),
          'Password must be at least 8 characters.'
        );
        valid = false;
        Track.event('reset_pw_submit_error', { reason: 'too_short' });
      } else if (pwVal !== confirmVal) {
        showFieldError(
          document.getElementById('confirm-password'),
          document.getElementById('err-confirm'),
          'Passwords do not match.'
        );
        valid = false;
        Track.event('reset_pw_submit_error', { reason: 'mismatch' });
      }

      if (!valid) return;

      Track.event('reset_pw_submit_attempt');
      const btn = document.getElementById('btn-submit');
      btnLoading(btn, true);

      setTimeout(() => {
        Track.event('reset_pw_submit_success');
        Proto.go('signin.html', { reset: 'success' });
      }, 900);
    });
  </script>
<script
  src="https://kdinsmore-aura.github.io/ux-tracker/v1/tracker.js"
  data-ingest-url="https://klbxfkyhdtouvrdmgtry.supabase.co/functions/v1/ux-tracker-ingest"
  data-study="bba19d63-f04b-4b02-96e5-3a84271c4df0">
</script>
</body>
</html>
